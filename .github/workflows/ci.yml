name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GhostScript and TeX Live
        run: sudo apt-get install -y ghostscript texlive-base texlive-fonts-recommended texlive-latex-base

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build all crates
        run: cargo build --all

      - name: Run all tests
        run: cargo test --all

      - name: Pixel similarity score (nocapture)
        run: cargo test test_pixel_similarity_logged -- --nocapture 2>&1
        continue-on-error: true

      - name: Show pixel similarity result
        run: cat /tmp/pixel_similarity.txt || true

      - name: Per-doc similarity scores (nocapture)
        run: cargo test test_hello_tex_pixel_similarity_logged test_sections_tex_pixel_similarity_logged test_math_tex_pixel_similarity_logged test_lists_tex_pixel_similarity_logged -- --nocapture 2>&1
        continue-on-error: true

      - name: Show per-doc similarity results
        run: |
          cat /tmp/hello_similarity.txt || true
          cat /tmp/sections_similarity.txt || true
          cat /tmp/math_similarity.txt || true
          cat /tmp/lists_similarity.txt || true

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --all -- -D warnings
        continue-on-error: true
